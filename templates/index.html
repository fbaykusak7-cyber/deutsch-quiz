<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Quiz</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  background:#fff;
  width:95%;
  max-width:900px;
  padding:22px;
  border-radius:18px;
  text-align:center;
  box-shadow:0 20px 50px rgba(0,0,0,0.30);
}
.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:14px;
}
.cat{
  text-decoration:none;
  padding:7px 12px;
  border-radius:10px;
  background:#eef2ff;
  color:#1f2a44;
  font-weight:700;
}
.cat.active{
  background:#2a5298;
  color:#fff;
}
.stats{
  font-size:14px;
  margin-bottom:10px;
}
.score{
  display:inline-block;
  font-weight:800;
}
.bounce{
  animation:bounce 0.35s;
}
@keyframes bounce{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}
#word{
  margin:14px 0;
  font-size:30px;
  font-weight:900;
}
.listen{
  width:100%;
  padding:12px;
  border:none;
  border-radius:12px;
  background:#111827;
  color:white;
  font-size:16px;
  cursor:pointer;
  margin-bottom:10px;
}
.answer{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#2a5298;
  color:white;
  font-size:16px;
  cursor:pointer;
}
.feedback{
  height:26px;
  font-weight:900;
  font-size:18px;
  margin:8px 0;
}
.correct{ color:#16a34a; }
.wrong{ color:#dc2626; }

.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.85);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}
.overlay-box{
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
</style>
</head>

<body>

<div class="card">

<div class="catbar">
<a class="cat {% if selected_level=='a1' %}active{% endif %}" href="/set/a1">A1</a>
<a class="cat {% if selected_level=='a2' %}active{% endif %}" href="/set/a2">A2</a>
<a class="cat {% if selected_level=='hotel' %}active{% endif %}" href="/set/hotel">Hotel</a>
<a class="cat {% if selected_level=='verb' %}active{% endif %}" href="/set/verb">Verb</a>
<a class="cat {% if selected_level=='pronouns' %}active{% endif %}" href="/set/pronouns">Pronouns</a>
<a class="cat {% if selected_level=='mixed' %}active{% endif %}" href="/set/mixed">Mixed</a>
<a class="cat {% if selected_level=='wrong' %}active{% endif %}" href="/set/wrong">Wrong ({{wrong_count}})</a>
</div>

<div class="stats">
Category: {{selected_level.upper()}} |
Level {{level_number}} |
XP {{xp}} |
Score <span id="scoreValue" class="score">{{score}}</span> / {{total}}
</div>

<div id="word">{{german}}</div>

<button class="listen" id="listenBtn">Listen (German)</button>

<div id="fb" class="feedback"></div>

<form method="post">
{% for o in options %}
<button class="answer" type="submit" name="answer" value="{{o}}">{{o}}</button>
{% endfor %}
</form>

</div>

<div id="overlay" class="overlay">
  <div class="overlay-box">
    <h3>Enable Sound</h3>
    <p>Tap once to activate sound</p>
    <button onclick="enableSound()">Enable</button>
  </div>
</div>

<script>

let soundEnabled = false;
let bestVoice = null;

/* FORCE overlay always first */
function enableSound(){
  soundEnabled = true;
  localStorage.setItem("soundEnabled","1");
  document.getElementById("overlay").style.display="none";
  autoSpeak();
}

if(localStorage.getItem("soundEnabled")==="1"){
  soundEnabled=true;
  document.getElementById("overlay").style.display="none";
}

/* PICK BEST GERMAN VOICE */
function pickVoice(){
  const voices = speechSynthesis.getVoices();
  bestVoice =
    voices.find(v => v.lang && v.lang.startsWith("de") && /siri|google|premium|enhanced|natural/i.test(v.name))
    ||
    voices.find(v => v.lang && v.lang.startsWith("de"))
    ||
    null;
}

speechSynthesis.onvoiceschanged = pickVoice;
pickVoice();

/* SPEAK */
function speakGerman(text){
  if(!soundEnabled) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang="de-DE";
  u.rate=0.9;
  if(bestVoice) u.voice=bestVoice;
  speechSynthesis.speak(u);
}

function autoSpeak(){
  setTimeout(()=>speakGerman(document.getElementById("word").innerText),200);
}

/* CORRECT WRONG SOUND (MP3 GUARANTEED) */
function playCorrect(){
  if(!soundEnabled) return;
  new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3").play();
}
function playWrong(){
  if(!soundEnabled) return;
  new Audio("https://www.soundjay.com/buttons/sounds/button-10.mp3").play();
}

/* FEEDBACK */
window.onload=function(){

  if(soundEnabled){
    autoSpeak();
  }

  const fb="{{feedback}}";
  const fbEl=document.getElementById("fb");

  if(fb==="correct"){
    fbEl.textContent="Correct";
    fbEl.className="feedback correct";
    playCorrect();
    const scoreEl=document.getElementById("scoreValue");
    scoreEl.classList.add("bounce");
    setTimeout(()=>scoreEl.classList.remove("bounce"),400);
  }

  if(fb==="wrong"){
    fbEl.textContent="Wrong";
    fbEl.className="feedback wrong";
    playWrong();
  }

};

document.getElementById("listenBtn").addEventListener("click",autoSpeak);

</script>

</body>
</html>
