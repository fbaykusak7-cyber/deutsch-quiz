<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Quiz</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  background:#fff;
  width:95%;
  max-width:900px;
  padding:22px;
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.30);
  text-align:center;
}
.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:14px;
}
.cat{
  padding:7px 12px;
  border-radius:10px;
  background:#eef2ff;
  cursor:pointer;
  font-weight:700;
}
.cat.active{
  background:#2a5298;
  color:#fff;
}
.stats{
  font-size:14px;
  margin-bottom:10px;
}
#word{
  margin:14px 0;
  font-size:30px;
  font-weight:900;
}
.answer{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#2a5298;
  color:white;
  font-size:16px;
  cursor:pointer;
}
.feedback{
  height:26px;
  font-weight:900;
  font-size:18px;
  margin:8px 0;
}
.correct{ color:#16a34a; }
.wrong{ color:#dc2626; }
</style>
</head>

<body>

<div class="card">

<div class="catbar" id="catbar">
<span class="cat" data-cat="a1">A1</span>
<span class="cat" data-cat="a2">A2</span>
<span class="cat" data-cat="hotel">Hotel</span>
<span class="cat" data-cat="verb">Verb</span>
<span class="cat" data-cat="pronouns">Pronouns</span>
<span class="cat" data-cat="mixed">Mixed</span>
<span class="cat" data-cat="wrong" id="wrongTab">Wrong ({{wrong_count}})</span>
</div>

<div class="stats">
Category: <span id="catName">{{selected_level|upper}}</span> |
Level <span id="levelNum">{{level_number}}</span> |
XP <span id="xpVal">{{xp}}</span> |
Score <span id="scoreValue">{{score}}</span> / <span id="totalValue">{{total}}</span>
</div>

<div id="word">{{german}}</div>

<div id="fb" class="feedback"></div>

<div id="answers">
{% for o in options %}
<button class="answer" data-answer="{{o}}">{{o}}</button>
{% endfor %}
</div>

</div>

<script>

/* =========================
   CLEAN GERMAN TTS SYSTEM
   ========================= */

let userInteracted = false;
let bestVoice = null;

/* Pick best German voice */
function pickBestVoice(){
  if(!('speechSynthesis' in window)) return;

  const voices = speechSynthesis.getVoices();
  if(!voices || !voices.length) return;

  const german = voices.filter(v =>
    v.lang && v.lang.toLowerCase().startsWith("de")
  );

  if(!german.length) return;

  bestVoice = german.find(v =>
    /premium|enhanced|google|natural|siri/i.test(v.name)
  ) || german[0];
}

if('speechSynthesis' in window){
  pickBestVoice();
  speechSynthesis.onvoiceschanged = pickBestVoice;
}

function speakGerman(text){
  if(!userInteracted) return;

  try{ speechSynthesis.cancel(); }catch(e){}

  const u = new SpeechSynthesisUtterance(text);
  u.lang="de-DE";
  u.rate=0.9;

  if(bestVoice){
    u.voice = bestVoice;
  }

  speechSynthesis.speak(u);
}

function autoSpeak(){
  const w=document.getElementById("word");
  if(w){
    setTimeout(()=>speakGerman(w.innerText),200);
  }
}

/* Unlock after first interaction (iOS rule) */
document.addEventListener("click",()=>{
  userInteracted=true;
},{once:true});

/* =========================
   UI + AJAX
   ========================= */

function setFeedback(type){
  const fb=document.getElementById("fb");

  if(type==="correct"){
    fb.textContent="Correct";
    fb.className="feedback correct";
  }
  else if(type==="wrong"){
    fb.textContent="Wrong";
    fb.className="feedback wrong";
  }
  else{
    fb.textContent="";
    fb.className="feedback";
  }
}

function renderOptions(options){
  const wrap=document.getElementById("answers");
  wrap.innerHTML="";

  options.forEach(opt=>{
    const b=document.createElement("button");
    b.className="answer";
    b.dataset.answer=opt;
    b.textContent=opt;
    wrap.appendChild(b);
  });
}

function applyState(data){
  document.getElementById("word").textContent=data.german;
  document.getElementById("scoreValue").textContent=data.score;
  document.getElementById("totalValue").textContent=data.total;
  document.getElementById("xpVal").textContent=data.xp;
  document.getElementById("levelNum").textContent=data.level_number;
  document.getElementById("catName").textContent=(data.selected_level||"").toUpperCase();
  document.getElementById("wrongTab").textContent="Wrong ("+(data.wrong_count||0)+")";

  renderOptions(data.options||[]);
  setFeedback(data.feedback||"");
  autoSpeak();
}

async function apiPost(url,data){
  const r=await fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data||{})
  });
  return await r.json();
}

async function refresh(){
  const r=await fetch("/api/state");
  const data=await r.json();
  applyState(data);
}

document.getElementById("answers").addEventListener("click",async(e)=>{
  const btn=e.target.closest(".answer");
  if(!btn) return;

  userInteracted=true;

  const ans=btn.dataset.answer;
  const data=await apiPost("/api/answer",{answer:ans});
  applyState(data);
});

document.getElementById("catbar").addEventListener("click",async(e)=>{
  const tab=e.target.closest(".cat");
  if(!tab) return;

  userInteracted=true;

  const data=await apiPost("/api/set_category",{category:tab.dataset.cat});
  applyState(data);
});

window.addEventListener("load",refresh);

</script>

</body>
</html>
