<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Quiz</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  width:95%;
  max-width:700px;
  padding:25px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

@media(min-width:900px){
  .card{padding:40px;}
  h2{font-size:36px;}
}

button{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:#2a5298;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:active{
  transform:scale(0.97);
}

.feedback{
  margin:10px 0;
  font-weight:bold;
  font-size:20px;
  height:28px;
}

.correct{ color:#1db954; }
.wrong{ color:#e63946; }

.score{
  display:inline-block;
  transition:0.3s;
  font-weight:bold;
}

.bounce{
  animation:bounce 0.4s;
}

@keyframes bounce{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}
</style>
</head>

<body>

<div class="card">

<div>
Score: <span id="scoreValue" class="score">{{score}}</span> / {{total}}
</div>

<h2 id="word">{{german}}</h2>

<button onclick="speakWord()">🔊 Listen</button>

<div id="fb" class="feedback"></div>

<form method="post">
{% for o in options %}
<button type="submit" name="answer" value="{{o}}">{{o}}</button>
{% endfor %}
</form>

</div>

<script>

/* === Listen (TTS) === */
function speakWord(){
  const text=document.getElementById("word").innerText;

  if(!('speechSynthesis' in window)) return;

  const utter=new SpeechSynthesisUtterance(text);
  utter.lang="de-DE";
  utter.rate=0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(utter);
}

/* === Correct / Wrong Sound (iPhone stabil) === */
function playCorrect(){
  const audio=new Audio("https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg");
  audio.play();
}

function playWrong(){
  const audio=new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
  audio.play();
}

/* === Feedback + Animation === */
window.onload=function(){

  const fb="{{feedback}}";
  const fbEl=document.getElementById("fb");

  if(fb==="correct"){
    fbEl.innerText="Correct ✅";
    fbEl.className="feedback correct";
    playCorrect();

    const scoreEl=document.getElementById("scoreValue");
    scoreEl.classList.add("bounce");
    setTimeout(()=>scoreEl.classList.remove("bounce"),400);
  }

  if(fb==="wrong"){
    fbEl.innerText="Wrong ❌";
    fbEl.className="feedback wrong";
    playWrong();
  }
};
</script>

</body>
</html>
