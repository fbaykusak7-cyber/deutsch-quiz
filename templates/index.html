<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Quiz</title>

<style>

/* ===== GENEL ===== */

body{
  margin:0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  transition:0.3s;
}

/* ===== MASAÜSTÜ ===== */

@media (min-width: 900px){

  .card{
    width:800px;
    padding:40px;
  }

  h2{
    font-size:38px;
  }

  button.answer{
    font-size:18px;
    padding:16px;
  }

}

/* ===== TABLET ===== */

@media (min-width: 600px) and (max-width: 899px){

  .card{
    width:600px;
    padding:30px;
  }

  h2{
    font-size:30px;
  }

}

/* ===== MOBİL ===== */

@media (max-width: 599px){

  .card{
    width:95%;
    padding:20px;
  }

  h2{
    font-size:24px;
  }

  button.answer{
    font-size:15px;
    padding:14px;
  }

}

/* ===== ORTAK STİL ===== */

.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:20px;
}

.cat{
  padding:7px 12px;
  border-radius:8px;
  text-decoration:none;
  background:#eef2ff;
  color:#1f2a44;
  font-weight:600;
  font-size:14px;
}

.cat.active{
  background:#2a5298;
  color:white;
}

.stats{
  font-size:14px;
  margin-bottom:15px;
  color:#444;
}

button.answer{
  width:100%;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#2a5298;
  color:white;
  cursor:pointer;
  transition:0.2s;
}

button.answer:hover{
  background:#1e3c72;
}

button.answer:active{
  transform:scale(0.97);
}

.feedback{
  height:25px;
  margin:10px 0;
  font-weight:bold;
  font-size:16px;
}

</style>
</head>

<body>

<div class="card">

<div class="catbar">
<a class="cat {% if selected_level=='a1' %}active{% endif %}" href="/set/a1">A1</a>
<a class="cat {% if selected_level=='a2' %}active{% endif %}" href="/set/a2">A2</a>
<a class="cat {% if selected_level=='hotel' %}active{% endif %}" href="/set/hotel">Hotel</a>
<a class="cat {% if selected_level=='verb' %}active{% endif %}" href="/set/verb">Verb</a>
<a class="cat {% if selected_level=='pronouns' %}active{% endif %}" href="/set/pronouns">Pronouns</a>
<a class="cat {% if selected_level=='mixed' %}active{% endif %}" href="/set/mixed">Mixed</a>
<a class="cat {% if selected_level=='wrong' %}active{% endif %}" href="/set/wrong">Wrong</a>
</div>

<div class="stats">
Category: {{selected_level.upper()}} |
Level {{level_number}} |
XP {{xp}} |
Score {{score}} / {{total}}
</div>

<h2 id="word">{{german}}</h2>
<div id="fb" class="feedback"></div>

<form method="post">
{% for o in options %}
<button class="answer" type="submit" name="answer" value="{{o}}">{{o}}</button>
{% endfor %}
</form>

</div>

<script>

// 🔊 MOBİL + DESKTOP SES

function speak(text){
  const u = new SpeechSynthesisUtterance(text);
  u.lang="de-DE";
  u.rate=0.9;
  speechSynthesis.cancel();
  speechSynthesis.speak(u);
}

function playCorrect(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type="triangle";
  o.frequency.value=950;
  g.gain.value=0.35;
  o.connect(g); g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.18);
}

function playWrong(){
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type="sawtooth";
  o.frequency.value=200;
  g.gain.value=0.35;
  o.connect(g); g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.25);
}

window.onload=function(){
  setTimeout(()=>speak(document.getElementById("word").innerText),400);

  const fb="{{feedback}}";

  if(fb==="correct"){
    document.getElementById("fb").innerText="Correct ✅";
    playCorrect();
  }

  if(fb==="wrong"){
    document.getElementById("fb").innerText="Wrong ❌";
    playWrong();
  }
}

</script>

</body>
</html>
