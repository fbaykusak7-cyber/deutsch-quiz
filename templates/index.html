<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Quiz</title>

<style>

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.card{
  background:white;
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.3);
  width:95%;
  max-width:800px;
  padding:25px;
  text-align:center;
}

@media(min-width:900px){
  .card{padding:40px;}
  h2{font-size:38px;}
}

.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:15px;
}

.cat{
  padding:6px 10px;
  border-radius:8px;
  text-decoration:none;
  background:#eef2ff;
  color:#1f2a44;
  font-size:14px;
  font-weight:600;
}

.cat.active{
  background:#2a5298;
  color:white;
}

.stats{
  font-size:14px;
  margin-bottom:15px;
}

.score{
  font-weight:bold;
  display:inline-block;
  transition:0.3s;
}

.bounce{
  animation:bounce 0.4s;
}

@keyframes bounce{
  0%{transform:scale(1);}
  50%{transform:scale(1.4);}
  100%{transform:scale(1);}
}

button.answer{
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:10px;
  background:#2a5298;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.feedback{
  height:24px;
  margin:8px 0;
  font-weight:bold;
  font-size:16px;
}

.correct{
  color:#1db954;
}

.wrong{
  color:#e63946;
}

</style>
</head>

<body>

<div class="card">

<div class="catbar">
<a class="cat {% if selected_level=='a1' %}active{% endif %}" href="/set/a1">A1</a>
<a class="cat {% if selected_level=='a2' %}active{% endif %}" href="/set/a2">A2</a>
<a class="cat {% if selected_level=='hotel' %}active{% endif %}" href="/set/hotel">Hotel</a>
<a class="cat {% if selected_level=='verb' %}active{% endif %}" href="/set/verb">Verb</a>
<a class="cat {% if selected_level=='pronouns' %}active{% endif %}" href="/set/pronouns">Pronouns</a>
<a class="cat {% if selected_level=='mixed' %}active{% endif %}" href="/set/mixed">Mixed</a>
<a class="cat {% if selected_level=='wrong' %}active{% endif %}" href="/set/wrong">Wrong</a>
</div>

<div class="stats">
Category: {{selected_level.upper()}} |
Level {{level_number}} |
XP {{xp}} |
Score <span id="scoreValue" class="score">{{score}}</span> / {{total}}
</div>

<h2 id="word">{{german}}</h2>
<div id="fb" class="feedback"></div>

<form method="post">
{% for o in options %}
<button class="answer" type="submit" name="answer" value="{{o}}">{{o}}</button>
{% endfor %}
</form>

</div>

<script>

let audioUnlocked=false;

function unlockAudio(){
  if(audioUnlocked) return;
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  ctx.resume();
  audioUnlocked=true;
}

document.addEventListener("touchstart",unlockAudio,{once:true});
document.addEventListener("click",unlockAudio,{once:true});

function speak(text){
  if(!audioUnlocked) return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang="de-DE";
  u.rate=0.9;
  speechSynthesis.speak(u);
}

function playCorrect(){
  if(!audioUnlocked) return;
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type="triangle";
  o.frequency.value=900;
  g.gain.value=0.4;
  o.connect(g);
  g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.2);
}

function playWrong(){
  if(!audioUnlocked) return;
  const ctx=new (window.AudioContext||window.webkitAudioContext)();
  const o=ctx.createOscillator();
  const g=ctx.createGain();
  o.type="sawtooth";
  o.frequency.value=200;
  g.gain.value=0.4;
  o.connect(g);
  g.connect(ctx.destination);
  o.start();
  o.stop(ctx.currentTime+0.25);
}

window.onload=function(){

  const fb="{{feedback}}";
  const fbEl=document.getElementById("fb");

  if(fb==="correct"){
    fbEl.innerText="Correct";
    fbEl.className="feedback correct";
    playCorrect();

    // skor animasyonu
    const scoreEl=document.getElementById("scoreValue");
    scoreEl.classList.add("bounce");
    setTimeout(()=>scoreEl.classList.remove("bounce"),400);
  }

  if(fb==="wrong"){
    fbEl.innerText="Wrong";
    fbEl.className="feedback wrong";
    playWrong();
  }

  setTimeout(()=>{
    speak(document.getElementById("word").innerText);
  },500);
}

</script>

</body>
</html>
