<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch Quiz</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}
.card{
  background:#fff;
  width:95%;
  max-width:900px;
  padding:22px;
  border-radius:18px;
  box-shadow:0 20px 50px rgba(0,0,0,0.30);
  text-align:center;
}
.catbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
  margin-bottom:14px;
}
.cat{
  padding:7px 12px;
  border-radius:10px;
  background:#eef2ff;
  cursor:pointer;
  font-weight:700;
  border:1px solid #d8def0;
}
.cat.active{
  background:#2a5298;
  color:#fff;
  border-color:#2a5298;
}
.stats{
  font-size:14px;
  margin-bottom:10px;
}
.score{
  font-weight:800;
}
#word{
  margin:14px 0;
  font-size:30px;
  font-weight:900;
}
.answer{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:12px;
  background:#2a5298;
  color:white;
  font-size:16px;
  cursor:pointer;
}
.feedback{
  height:26px;
  font-weight:900;
  font-size:18px;
  margin:8px 0;
}
.correct{ color:#16a34a; }
.wrong{ color:#dc2626; }
</style>
</head>

<body>

<div class="card">

<div class="catbar">
<span class="cat" data-cat="a1">A1</span>
<span class="cat" data-cat="a2">A2</span>
<span class="cat" data-cat="hotel">Hotel</span>
<span class="cat" data-cat="verb">Verb</span>
<span class="cat" data-cat="pronouns">Pronouns</span>
<span class="cat" data-cat="mixed">Mixed</span>
<span class="cat" data-cat="wrong" id="wrongTab">Wrong ({{wrong_count}})</span>
</div>

<div class="stats">
Category: <span id="catName">{{selected_level|upper}}</span> |
Level <span id="levelNum">{{level_number}}</span> |
XP <span id="xpVal">{{xp}}</span> |
Score <span id="scoreValue" class="score">{{score}}</span> / <span id="totalValue">{{total}}</span>
</div>

<div id="word">{{german}}</div>

<div id="fb" class="feedback"></div>

<div id="answers">
{% for o in options %}
<button class="answer" data-answer="{{o}}">{{o}}</button>
{% endfor %}
</div>

</div>

<script>

/* ==============================
   AUDIO + AUTO GERMAN + FEEDBACK
   ============================== */

let audioCtx = null;
let bestVoice = null;

/* Unlock audio for iPhone */
function unlockAudio(){
  if(!audioCtx){
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if(audioCtx.state === "suspended"){
    audioCtx.resume();
  }
}

/* Pick best German voice */
function pickBestVoice(){
  if(!('speechSynthesis' in window)) return;
  const voices = speechSynthesis.getVoices();
  bestVoice =
    voices.find(v => v.lang && v.lang.startsWith("de") && /premium|enhanced|google|natural/i.test(v.name))
    ||
    voices.find(v => v.lang && v.lang.startsWith("de"))
    ||
    null;
}

if('speechSynthesis' in window){
  pickBestVoice();
  speechSynthesis.onvoiceschanged = pickBestVoice;
}

/* Auto speak German */
function speakGerman(text){
  if(!('speechSynthesis' in window)) return;

  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "de-DE";
  u.rate = 0.9;
  if(bestVoice) u.voice = bestVoice;
  speechSynthesis.speak(u);
}

function autoSpeak(){
  const w = document.getElementById("word");
  if(w){
    setTimeout(()=> speakGerman(w.innerText), 150);
  }
}

/* Correct sound */
function playCorrect(){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "triangle";
  o.frequency.setValueAtTime(900, audioCtx.currentTime);
  g.gain.setValueAtTime(0.001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.25);
}

/* Wrong sound */
function playWrong(){
  if(!audioCtx) return;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = "sawtooth";
  o.frequency.setValueAtTime(180, audioCtx.currentTime);
  g.gain.setValueAtTime(0.001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
  o.connect(g);
  g.connect(audioCtx.destination);
  o.start();
  o.stop(audioCtx.currentTime + 0.3);
}

/* Feedback */
function setFeedback(type){
  const fb = document.getElementById("fb");

  if(type === "correct"){
    fb.textContent = "Correct";
    fb.className = "feedback correct";
    playCorrect();
  }
  else if(type === "wrong"){
    fb.textContent = "Wrong";
    fb.className = "feedback wrong";
    playWrong();
  }
  else{
    fb.textContent = "";
    fb.className = "feedback";
  }
}

/* Apply state */
function applyState(data, feedbackToShow){

  document.getElementById("word").textContent = data.german;
  document.getElementById("scoreValue").textContent = data.score;
  document.getElementById("totalValue").textContent = data.total;
  document.getElementById("xpVal").textContent = data.xp;
  document.getElementById("levelNum").textContent = data.level_number;
  document.getElementById("catName").textContent = (data.selected_level || "").toUpperCase();
  document.getElementById("wrongTab").textContent = "Wrong (" + (data.wrong_count || 0) + ")";

  setFeedback(feedbackToShow || "");
  autoSpeak();
}

/* Answer click */
async function onAnswerClick(e){
  e.preventDefault();
  unlockAudio();

  const ans = e.currentTarget.dataset.answer;

  const data = await fetch("/api/answer", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ answer: ans })
  }).then(r=>r.json());

  applyState(data, data.feedback);
}

document.querySelectorAll(".answer").forEach(b=>{
  b.addEventListener("click", onAnswerClick);
});

/* Category click */
document.querySelectorAll(".cat").forEach(tab=>{
  tab.addEventListener("click", async ()=>{
    unlockAudio();
    const cat = tab.dataset.cat;

    const data = await fetch("/api/set_category", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ category: cat })
    }).then(r=>r.json());

    applyState(data, "");
  });
});

/* On load */
window.addEventListener("load", ()=>{
  autoSpeak();
});

</script>

</body>
</html>
